# Build and publish the chromium image to Docker Hub and GHCR.
#
# Targets:
#   - docker.io/runbrowser/chromium
#   - ghcr.io/runbrowser-dev/chromium
#
# Triggers:
#   - push to main:           pushes :latest and :main-<sha>
#   - tag v*.*.* (e.g. v0.1): pushes :v0.1.0, :0.1.0, :0.1, :latest
#   - manual workflow_dispatch
#
# Required secrets (Settings → Secrets and variables → Actions):
#   - DOCKERHUB_USERNAME    Docker Hub user with push rights to runbrowser/
#   - DOCKERHUB_TOKEN       Docker Hub access token (Read/Write/Delete)
# GHCR uses the workflow's built-in GITHUB_TOKEN, no extra secret needed.

name: publish

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Smoke test (single-arch, fast)
        run: |
          docker build -t runbrowser:smoke .
          docker run -d --name smoke --shm-size=2gb -p 9222:9222 runbrowser:smoke
          # wait up to 30s for /json/version
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9222/json/version >/dev/null 2>&1; then
              echo "ok after ${i}s"; exit_code=0; break
            fi
            sleep 1
          done
          docker logs smoke
          docker rm -f smoke
          test "${exit_code:-1}" = "0"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            runbrowser/chromium
            ghcr.io/runbrowser-dev/chromium
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
